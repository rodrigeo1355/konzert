name: CD

on:
  push:
    branches: [main, master]

jobs:
  deploy-web:
    name: Deploy Web (Vercel)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Run DB migrations
        run: cd packages/database && npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Generate Prisma Client
        run: cd packages/database && npx prisma generate

      - name: Deploy to Vercel
        run: |
          pnpm dlx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          pnpm dlx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          pnpm dlx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-workers:
    name: Deploy Workers (Railway)
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-web
    continue-on-error: true
    steps:
      - name: Trigger Railway redeploy
        run: |
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation { serviceInstanceRedeploy(environmentId: \"ed6adb4d-572d-41c1-a407-f9c378c81aba\", serviceId: \"a67732b2-efe5-4eb7-bb5c-0ee5f917bb93\") }"
            }' | grep -q '"serviceInstanceRedeploy":true' && echo "Deploy triggered" || (echo "Deploy failed" && exit 1)
